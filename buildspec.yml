version: 0.2

phases:
  install:
    commands:
      - npm install -g @aws-mdaa/cli

  build:
    commands:
      # Resolve org name (MDAA CLI doesn't resolve {{env_var:...}} in organization field)
      - sed -i "s/{{env_var:MDAA_ORG}}/${MDAA_ORG}/g" mdaa-config/mdaa.yaml

      # Inject cross-account IDs into pipeline config if set.
      # These enable cross-account bucket/KMS policies on the pipeline's model artifacts.
      - |
        set -e
        if [ -n "${PRE_PROD_ACCOUNT_ID:-}" ]; then
          echo "preProdAccountId: \"${PRE_PROD_ACCOUNT_ID}\"" >> mdaa-config/pipeline.yaml
        fi
        if [ -n "${PROD_ACCOUNT_ID:-}" ]; then
          echo "prodAccountId: \"${PROD_ACCOUNT_ID}\"" >> mdaa-config/pipeline.yaml
        fi

      # Deploy the SageMaker Pipeline via MDAA
      - cd mdaa-config && mdaa deploy && cd ..

      # Read pipeline outputs from SSM (created by mdaa deploy)
      - |
        set -e
        PIPELINE_NAME=$(aws ssm get-parameter --name "/${MDAA_ORG}/mlops/pipeline/sm-pipeline/${SAGEMAKER_PROJECT_NAME}/pipeline-name" --query 'Parameter.Value' --output text)
        PIPELINE_BUCKET=$(aws ssm get-parameter --name "/${MDAA_ORG}/mlops/pipeline/bucket/pipeline-${SAGEMAKER_PROJECT_NAME}/name" --query 'Parameter.Value' --output text)
        PIPELINE_KMS=$(aws ssm get-parameter --name "/${MDAA_ORG}/mlops/pipeline/kms/sm-pipeline-${SAGEMAKER_PROJECT_NAME}/id" --query 'Parameter.Value' --output text)
        echo "Pipeline: ${PIPELINE_NAME}, Bucket: ${PIPELINE_BUCKET}"

      # Upload ML scripts to the pipeline bucket (CodeBuild role has org-scoped KMS access)
      - aws s3 cp source_scripts/preprocessing.py "s3://${PIPELINE_BUCKET}/${PIPELINE_NAME}/scripts/preprocessing.py" --sse aws:kms --sse-kms-key-id "${PIPELINE_KMS}"
      - aws s3 cp source_scripts/evaluate.py "s3://${PIPELINE_BUCKET}/${PIPELINE_NAME}/scripts/evaluate.py" --sse aws:kms --sse-kms-key-id "${PIPELINE_KMS}"

      # Start pipeline execution
      - |
        set -e
        echo "Starting pipeline execution for: ${PIPELINE_NAME}"
        aws sagemaker start-pipeline-execution \
          --pipeline-name "${PIPELINE_NAME}" \
          --pipeline-execution-display-name "codebuild-$(date +%Y%m%d-%H%M%S)"
      - echo "SageMaker Pipeline deployed and execution started."
