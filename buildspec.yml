version: 0.2

phases:
  install:
    commands:
      # === Verdaccio workaround (MDAA packages not on public npm) ===
      # Download pre-built packages from S3 model bucket and serve via local registry.
      - |
        set -e
        echo "Setting up local npm registry for MDAA packages..."
        MODEL_BUCKET="${ARTIFACT_BUCKET}"
        mkdir -p /tmp/mdaa-packages
        aws s3 cp "s3://${MODEL_BUCKET}/mdaa-packages/" /tmp/mdaa-packages/ --recursive --quiet
        npm install -g verdaccio --registry https://registry.npmjs.org
        # Configure verdaccio for anonymous publish
        mkdir -p /root/.config/verdaccio
        cat > /root/.config/verdaccio/config.yaml << 'VCONF'
        storage: /tmp/verdaccio-storage
        auth:
          htpasswd:
            file: ./htpasswd
            max_users: 100
        uplinks:
          npmjs:
            url: https://registry.npmjs.org/
        packages:
          '@aws-mdaa/*':
            access: $all
            publish: $all
          '**':
            access: $all
            publish: $all
            proxy: npmjs
        log: { type: stdout, format: pretty, level: error }
        VCONF
        # Start verdaccio
        nohup verdaccio --listen 4873 > /tmp/verdaccio.log 2>&1 &
        sleep 3
        # Register user and get token
        TOKEN=$(curl -s -X PUT http://localhost:4873/-/user/org.couchdb.user:ci \
          -H "Content-Type: application/json" \
          -d '{"name":"ci","password":"ci12345"}' | python3 -c "import json,sys;print(json.load(sys.stdin).get('token',''))")
        echo "//localhost:4873/:_authToken=\"${TOKEN}\"" >> /root/.npmrc
        # Publish all packages
        for tgz in /tmp/mdaa-packages/*.tgz; do
          npm publish "$tgz" --registry http://localhost:4873 2>/dev/null || true
        done
        # Set local registry as default
        npm config set registry http://localhost:4873
        echo "Local registry ready with $(ls /tmp/mdaa-packages/*.tgz | wc -l) packages"
      # Install MDAA CLI from local registry
      - npm install -g @aws-mdaa/cli

  build:
    commands:
      # Resolve org name (MDAA CLI doesn't resolve {{env_var:...}} in organization field)
      - sed -i "s/{{env_var:MDAA_ORG}}/${MDAA_ORG}/g" mdaa-config/mdaa.yaml

      # Inject cross-account IDs into pipeline config if set.
      # These enable cross-account bucket/KMS policies on the pipeline's model artifacts.
      - |
        set -e
        if [ -n "${PRE_PROD_ACCOUNT_ID:-}" ]; then
          echo "preProdAccountId: \"${PRE_PROD_ACCOUNT_ID}\"" >> mdaa-config/pipeline.yaml
        fi
        if [ -n "${PROD_ACCOUNT_ID:-}" ]; then
          echo "prodAccountId: \"${PROD_ACCOUNT_ID}\"" >> mdaa-config/pipeline.yaml
        fi

      # Deploy the SageMaker Pipeline via MDAA
      - cd mdaa-config && mdaa deploy && cd ..

      # Read pipeline name from SSM (created by mdaa deploy above)
      # PIPELINE_BUCKET_NAME and PIPELINE_KMS_ARN are set as CodeBuild env vars by the core stack.
      - |
        set -e
        PIPELINE_NAME=$(aws ssm get-parameter --name "/${MDAA_ORG}/mlops/pipeline/sm-pipeline/${SAGEMAKER_PROJECT_NAME}/pipeline-name" --query 'Parameter.Value' --output text)
        echo "Pipeline: ${PIPELINE_NAME}, Bucket: ${PIPELINE_BUCKET_NAME}"

      # Upload ML scripts to the pipeline bucket (bucket default encryption handles KMS)
      - aws s3 cp source_scripts/preprocessing.py "s3://${PIPELINE_BUCKET_NAME}/${PIPELINE_NAME}/scripts/preprocessing.py"
      - aws s3 cp source_scripts/evaluate.py "s3://${PIPELINE_BUCKET_NAME}/${PIPELINE_NAME}/scripts/evaluate.py"

      # Start pipeline execution
      - |
        set -e
        echo "Starting pipeline execution for: ${PIPELINE_NAME}"
        aws sagemaker start-pipeline-execution \
          --pipeline-name "${PIPELINE_NAME}" \
          --pipeline-execution-display-name "codebuild-$(date +%Y%m%d-%H%M%S)"
      - echo "SageMaker Pipeline deployed and execution started."
